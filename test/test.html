<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirador Integration Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #mirador {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div id="mirador"></div>
    <script src="../webpack/dist/main.js"></script>
    <script>
        // Track if Mirador loaded successfully
        window.miradorLoadedSuccessfully = false;
        window.consoleErrors = [];

        // Capture console errors
        const originalError = console.error;
        console.error = function(...args) {
            window.consoleErrors.push(args.map(arg => String(arg)).join(' '));
            originalError.apply(console, args);
        };

        try {
            // Minimal test manifest with data URI image (no external network requests)
            const manifestId = 'data:application/json,' + encodeURIComponent(JSON.stringify({
                "@context": "http://iiif.io/api/presentation/2/context.json",
                "@id": "urn:test-manifest",
                "@type": "sc:Manifest",
                "label": "Test Manifest",
                "description": "Minimal manifest for integration testing",
                "sequences": [{
                    "@type": "sc:Sequence",
                    "canvases": [{
                        "@id": "urn:test-canvas-1",
                        "@type": "sc:Canvas",
                        "label": "Test Canvas",
                        "height": 100,
                        "width": 100,
                        "images": [{
                            "@type": "oa:Annotation",
                            "motivation": "sc:painting",
                            "resource": {
                                "@id": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==",
                                "@type": "dctypes:Image",
                                "format": "image/png",
                                "height": 100,
                                "width": 100
                            },
                            "on": "urn:test-canvas-1"
                        }]
                    }]
                }]
            }));

            // Initialize Mirador with embedded test manifest as data URI
            const config = {
                id: 'mirador',
                windows: [{
                    manifestId: manifestId,
                }],
                plugins: window.miradorPlugins || []
            };

            if (typeof window.Mirador !== 'undefined') {
                const viewer = window.Mirador.viewer(config);
                window.miradorLoadedSuccessfully = true;
                window.miradorInstance = viewer;
            } else {
                console.error('Mirador is not defined on window object');
            }
        } catch (error) {
            console.error('Failed to initialize Mirador:', error);
            window.miradorLoadedSuccessfully = false;
        }
    </script>
</body>
</html>
